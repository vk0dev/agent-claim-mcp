name: Publish to npm

on:
  push:
    tags: ["v*"]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v7

      - name: Use Node.js 20
        uses: actions/setup-node@v5
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: MCP client smoke test
        run: npm run smoke

      - name: Verify npm publish credentials
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "${NODE_AUTH_TOKEN:-}" ]; then
            echo "::error::Missing required GitHub Actions secret NPM_TOKEN for repo vk0dev/agent-claim-mcp."
            echo "::error::Open https://github.com/vk0dev/agent-claim-mcp/settings/secrets/actions and set NPM_TOKEN to a valid npm token with publish access to @vk0/agent-claim-mcp."
            echo "::error::After fixing the secret, rerun the failed workflow run from the Actions tab."
            exit 1
          fi

          npm whoami >/dev/null 2>&1 || {
            echo "::error::NPM_TOKEN is present but npm authentication failed."
            echo "::error::Open https://github.com/vk0dev/agent-claim-mcp/settings/secrets/actions, replace NPM_TOKEN with a current npm token that has publish access to @vk0/agent-claim-mcp, then rerun the failed workflow run."
            exit 1
          }

      - name: Publish to npm with provenance
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          body: |
            Published to npm: https://www.npmjs.com/package/@vk0/${{ github.event.repository.name }}

            Install via `npx`:
            ```bash
            npx -y @vk0/${{ github.event.repository.name }}
            ```

            See [CHANGELOG.md](./CHANGELOG.md) for details.

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher
        continue-on-error: true

      - name: Authenticate to MCP Registry
        run: ./mcp-publisher login github-oidc
        continue-on-error: true

      - name: Publish to Official MCP Registry
        run: |
          ./mcp-publisher publish || \
          echo "::warning::MCP Registry publish failed — may need manual 'mcp-publisher publish'"
        continue-on-error: true

      # Tell the dashboard to refresh now instead of waiting for the next
      # collect cycle. Best-effort: publish is the real event.
      - name: Notify dashboard refresh
        run: |
          PAYLOAD="{\"product\":\"${GITHUB_REPOSITORY##*/}\",\"version\":\"${GITHUB_REF_NAME}\"}"
          SECRET="${{ secrets.DASHBOARD_REFRESH_SECRET }}"
          if [ -z "$SECRET" ]; then
            echo "::warning::DASHBOARD_REFRESH_SECRET not set — skipping notify"
            exit 0
          fi
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$SECRET" | sed 's/^.* //')
          curl -sS --max-time 15 \
            -H "X-Hub-Signature-256: sha256=$SIG" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            https://inbox.vk0.dev/api/dashboard/refresh \
            || echo "::warning::dashboard refresh webhook failed (cron will catch up)"
        continue-on-error: true

      # Post-release verification: fails the workflow if the release did not
      # actually land on npm / Official MCP Registry / Pages. De-masks the
      # continue-on-error publish steps above. Smithery is warn-only.
      - name: Post-release verify
        run: node scripts/post-release-verify.mjs "${GITHUB_REF_NAME#v}"
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}

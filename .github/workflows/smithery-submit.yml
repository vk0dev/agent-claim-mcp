name: One-time Smithery listing submission

on:
  workflow_dispatch:

jobs:
  smithery-submit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Smithery server listing via API
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          set -euo pipefail
          QUALIFIED="unfucker/agent-claim-mcp"
          ENCODED=$(echo "$QUALIFIED" | sed 's/\//%2F/g')

          echo "Creating server listing: $QUALIFIED"
          RESPONSE=$(curl -sS -w "\n%{http_code}" \
            -X PUT "https://registry.smithery.ai/servers/$ENCODED" \
            -H "Authorization: Bearer ${SMITHERY_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"displayName\":\"agent-claim-mcp\",\"description\":\"File-claim coordination for parallel AI coding agents: claim files before edits, no stomping.\"}")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "HTTP $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Server listing created successfully"
          else
            echo "::warning::Server creation returned HTTP $HTTP_CODE — may already exist"
          fi

      - name: Publish via Smithery CLI
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          set -euo pipefail
          echo "Attempting CLI publish..."
          npx -y @smithery/cli mcp publish -n unfucker/agent-claim-mcp 2>&1 || {
            echo "::warning::CLI publish failed — server listing was created via API in previous step"
            echo "The listing exists; MCPB bundle upload may need manual completion via smithery.ai"
          }

      - name: Verify listing exists
        env:
          SMITHERY_API_KEY: ${{ secrets.SMITHERY_API_KEY }}
        run: |
          set -euo pipefail
          QUALIFIED="unfucker/agent-claim-mcp"
          ENCODED=$(echo "$QUALIFIED" | sed 's/\//%2F/g')

          echo "Verifying listing..."
          HTTP_CODE=$(curl -sS -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer $SMITHERY_API_KEY" \
            "https://registry.smithery.ai/servers/$ENCODED")
          echo "GET /servers/$QUALIFIED → HTTP $HTTP_CODE"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "SUCCESS: Server is listed on Smithery"
          else
            echo "::error::Server not found after submission (HTTP $HTTP_CODE)"
            exit 1
          fi
